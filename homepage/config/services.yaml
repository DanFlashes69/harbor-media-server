- Operations & Health:
    - Synology DSM:
        icon: mdi-nas
        href: http://synology.example.lan:5000/
        description: Uptime | Volume | CPU | Memory
        siteMonitor: http://synology.example.lan:5000/
        statusStyle: dot
        widget:
          type: diskstation
          url: http://synology.example.lan:5000
          username: harboradmin
          password: change_me
          fields: ["uptime", "volumeAvailable", "resources.cpu", "resources.mem"]
          hideErrors: true
    - Pi-hole:
        icon: pi-hole.svg
        href: http://synology.example.lan:9080/admin/
        description: Blocked | DNS | Gravity
        statusStyle: dot
        widget:
          type: customapi
          url: http://update-status/status.json
          refreshInterval: 30000
          hideErrors: true
          mappings:
            - field: stackHealthy
              label: DNS
              remap:
                - value: true
                  to: Ready
                - value: false
                  to: Check
            - field: manual
              label: Gravity
              remap:
                - any: true
                  to: Loaded
            - field: appWarnings
              label: Session
              remap:
                - any: true
                  to: Local
    - Tdarr:
        icon: sh-tdarr.png
        href: http://synology.example.lan:8265
        description: Queue | Workers | Throughput
        siteMonitor: http://tdarr:8265
        statusStyle: dot
        widget:
          type: tdarr
          url: http://tdarr:8265
          hideErrors: true
    - Portainer:
        icon: portainer.svg
        href: http://synology.example.lan:9000
        description: Node | Engine | Containers
        siteMonitor: http://portainer:9000
        statusStyle: dot
        widget:
          type: customapi
          url: http://portainer:9000/api/status
          refreshInterval: 30000
          mappings:
            - field: Version
              label: Version
            - field: Version
              label: State
              remap:
                - any: true
                  to: Online
            - field: Version
              label: Node
              remap:
                - any: true
                  to: Local
    - Update Status:
        icon: mdi-update
        href: http://synology.example.lan:8099
        description: Health | Manual | Warnings
        siteMonitor: http://update-status
        statusStyle: dot
        widget:
          type: customapi
          url: http://update-status/status.json
          refreshInterval: 15000
          mappings:
            - field: stackHealthy
              label: Stack
              remap:
                - value: true
                  to: Healthy
                - value: false
                  to: Check
            - field: manual
              label: Manual
              format: size
            - field: appWarnings
              label: Warnings
              format: size

- Download Activity:
