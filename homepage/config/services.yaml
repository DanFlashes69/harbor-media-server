---
- Media:
    - Plex:
        icon: plex.svg
        href: http://localhost:32400/web
        description: Media streaming server
        widget:
          type: plex
          url: http://plex:32400
          key: your-plex-token
          fields: ["streams", "movies", "tv"]
    - Radarr:
        icon: radarr.svg
        href: http://localhost:7878
        description: Movie management
        widget:
          type: radarr
          url: http://radarr:7878
          key: your-radarr-api-key
    - Sonarr:
        icon: sonarr.svg
        href: http://localhost:8989
        description: TV show management
        widget:
          type: sonarr
          url: http://sonarr:8989
          key: your-sonarr-api-key
    - Lidarr:
        icon: lidarr.svg
        href: http://localhost:8686
        description: Music management
        widget:
          type: lidarr
          url: http://lidarr:8686
          key: your-lidarr-api-key
- Downloads:
    - qBittorrent:
        icon: qbittorrent.svg
        href: http://localhost:8081
        description: Torrent client (VPN protected)
        widget:
          type: qbittorrent
          url: http://gluetun:8081
          username: admin
          password: your-qbittorrent-password
    - SABnzbd:
        icon: sabnzbd.svg
        href: http://localhost:8082
        description: Usenet client (VPN protected)
    - Prowlarr:
        icon: prowlarr.svg
        href: http://localhost:9696
        description: Indexer manager
        widget:
          type: prowlarr
          url: http://prowlarr:9696
          key: your-prowlarr-api-key
    - Overseerr:
        icon: overseerr.svg
        href: http://localhost:5055
        description: Media requests
        widget:
          type: overseerr
          url: http://overseerr:5055
          key: your-overseerr-api-key
- Photos & Management:
    - Immich:
        icon: immich.svg
        href: http://localhost:2283
        description: Photo & video management
        widget:
          type: customapi
          url: http://immich-server:2283/api/server/statistics
          headers:
            x-api-key: your-immich-api-key
          mappings:
            - field: photos
              label: Photos
            - field: videos
              label: Videos
    - Bazarr:
        icon: bazarr.svg
        href: http://localhost:6767
        description: Subtitle downloads
        widget:
          type: bazarr
          url: http://bazarr:6767
          key: your-bazarr-api-key
    - Portainer:
        icon: portainer.svg
        href: http://localhost:9000
        description: Docker management
        widget:
          type: portainer
          url: http://portainer:9000
          env: 1
          key: your-portainer-api-key
    - Pi-hole:
        icon: pi-hole.svg
        href: http://localhost:8080/admin
        description: Network ad blocker
        widget:
          type: pihole
          url: http://pihole:80
          key: your-pihole-password
          version: 6
- Optimization:
    - Tdarr:
        icon: mdi-video-converter
        href: http://localhost:8265
        description: Media transcoding
        widget:
          type: tdarr
          url: http://tdarr:8265
