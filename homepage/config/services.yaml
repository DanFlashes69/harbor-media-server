---
- Streaming & Requests:
    - Plex:
        icon: plex.svg
        href: http://synology.example.lan:32400/web
        description: Live playback, streams, and library access
        siteMonitor: http://plex:32400/identity
        statusStyle: dot
        widget:
          type: plex
          url: http://plex:32400
          key: change_me_plex_token
          fields: ["streams", "movies", "tv"]
          hideErrors: true
    - Overseerr:
        icon: overseerr.svg
        href: http://synology.example.lan:5055
        description: Movies | Series | Requests
        siteMonitor: http://overseerr:5055
        statusStyle: dot
        widget:
          type: customapi
          url: http://overseerr:5055/api/v1/settings/public
          refreshInterval: 30000
          mappings:
            - field: initialized
              label: State
              remap:
                - value: true
                  to: Ready
                - value: false
                  to: Setup
            - field: localLogin
              label: Login
              remap:
                - value: true
                  to: Local
                - value: false
                  to: External
            - field: partialRequestsEnabled
              label: Requests
              remap:
                - value: true
                  to: Flexible
                - value: false
                  to: Standard
    - Immich:
        icon: immich.svg
        href: http://synology.example.lan:2283
        description: Users | Photos | Videos
        siteMonitor: http://immich-server:2283/api/server/ping
        statusStyle: dot
        widget:
          type: immich
          url: http://immich-server:2283
          key: change_me_immich_api_key
          version: 2
          fields: ["users", "photos", "videos"]

